# Smoke trial: one arm, one seed, builtin conductor (deterministic, no LLM cost
# in the conductor itself). Proves the whole pipeline: pi RPC + accordion
# extension + headless host + platform + collector + report.
#
# Caps are the owner's smoke baseline: turn cap 10000 = effectively off,
# 90 min wall clock is the real backstop, NO total-token cap.
trial: smoke-builtin
problems: xjq
model: token-router:deepseek/deepseek-v4-flash
thinkingLevel: medium
budget: 100000
protectTokens: 20000
arms:
  - conductor: builtin
seeds: 1
caps:
  costUsd: 10        # inert for token-router ($0 pricing) — validation requires it
  turns: 10000       # effectively off
  minutes: 90
parallel: 1
room:
  # Problem-SCOPED (`problems: xjq`), so create the room (bellows scopes a room's
  # problem_set only at create time). A pooled + scoped spec is rejected at
  # validation. Created rooms auto-archive at finalize.
  create: true
