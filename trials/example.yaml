# bellows trial spec — see src/types.ts (TrialSpec) for the full schema.
trial: keel-vs-naive-easy1
problems: easy-1
model: token-router:deepseek/deepseek-v4-flash
thinkingLevel: medium
budget: 70000
protectTokens: 20000
arms:
  - conductor: keel
  - conductor: compaction-naive
seeds: 3
caps:
  costUsd: 20          # standard tier (smoke baseline x2); inert for token-router
  turns: 10000         # effectively off — the owner's default; wall clock is the backstop
  minutes: 180
parallel: 3
room:
  # This trial is problem-SCOPED (`problems: easy-1`), so it must create its own
  # rooms: bellows scopes a room's problem_set only at create time. A pooled +
  # scoped spec is rejected at validation (the pool room's baked-in problem set
  # would silently override `problems`). Created rooms auto-archive at finalize.
  create: true
